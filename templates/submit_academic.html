<!DOCTYPE html>
<html>
<head>
    <title>Submit Academic Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-image: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
        }

        .form-container {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        h2 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .form-subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .academic-badge {
            display: inline-block;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3);
        }

        form {
            position: relative;
            z-index: 1;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
        }

        input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: #4facfe;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.3);
        }

        .submit-section {
            margin-top: 30px;
            text-align: center;
        }

        button {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.4);
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .back-link a:hover {
            color: #4facfe;
        }

        .form-footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h2>Submit Academic Details</h2>
            <p class="form-subtitle">Provide your information for certificate verification</p>
            <div class="academic-badge">Academic Information</div>
        </div>

        <!-- ✅ Only one correct form -->
        <form method="POST" enctype="multipart/form-data">
            <div class="form-grid">
                <div class="form-group">
                    <span class="input-icon">👤</span>
                    <input type="text" name="name" placeholder="Full Name" required>
                </div>

                <div class="form-group">
                    <span class="input-icon">📧</span>
                    <input type="email" name="email" placeholder="Email" required>
                </div>

                <div class="form-group">
                    <span class="input-icon">📱</span>
                    <input type="text" name="phone" placeholder="Phone Number" required>
                </div>

                <div class="form-group">
                    <span class="input-icon">🏫</span>
                    <input type="text" name="department" placeholder="Department" required>
                </div>

                <div class="form-group full-width">
                    <span class="input-icon">🎓</span>
                    <input type="text" name="degree" placeholder="Degree Details" required>
                </div>

                <!-- Certificate file upload -->
                <div class="form-group full-width">
                    <span class="input-icon">📄</span>
                    <input type="file" name="certificate_file" accept=".pdf,image/*" required>
                </div>
            </div>

            <div class="submit-section">
                <button type="submit">Submit Details</button>
            </div>
        </form>

        <div class="back-link">
            <a href="/dashboard">← Back to Dashboard</a>
        </div>

        <div class="form-footer">
            Certificate Verification System © 2025
        </div>
    </div>
</body>
</html>
