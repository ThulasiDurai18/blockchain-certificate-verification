<!DOCTYPE html>
<html>
<head>
    <title>Home - Certificate System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-image: url('https://www.shutterstock.com/image-vector/digital-smart-contract-isometric-icon-600nw-1892479843.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        
        .container {
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        ul {
            list-style: none;
            padding: 0;
        }
        
        li {
            margin: 20px 0;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        li:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        a {
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        a:hover {
            color: #4facfe;
            text-shadow: 0 0 10px rgba(79, 172, 254, 0.7);
        }
        
        .role {
            font-weight: 700;
            color: #4facfe;
            margin-right: 10px;
        }
        
        .separator {
            margin: 0 15px;
            opacity: 0.7;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Certificate Verification System</h2>
        <ul>
            <li>
                <span class="role">Admin Portal:</span>
                <a href="/login?role=admin">University Login</a>
            </li>
            <li>
                <span class="role">Student Portal:</span>
                <a href="/login?role=student">Student Login</a>
                <span class="separator">|</span>
                <a href="/register">New Registration</a>
            </li>
            <li>
                <span class="role">Verifier Portal:</span>
                <a href="/login?role=verifier">Verifier Login</a>
            </li>
        </ul>
        <div class="footer">
            Secure Certificate Verification System © 2025
        </div>
    </div>
</body>
</html>
